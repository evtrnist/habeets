<section class="page">
  <section class="card">
    <form class="b-form" [formGroup]="authForm" (submit)="submit(authForm)">
      <div class="tui-space_bottom-2">
        <tui-input formControlName="email">
          email
          <input tuiTextfield type="email" />
        </tui-input>
        <tui-error *ngIf="emailError" [error]="emailError"></tui-error>
      </div>
      <div class="tui-space_bottom-2">
        <tui-input formControlName="password">
          password
          <input tuiTextfield type="password" />
        </tui-input>
        <tui-error *ngIf="passwordError" [error]="passwordError"></tui-error>
      </div>
      <button
        tuiButton
        type="submit"
        appearance="custom"
        class="tui-space_right-3 tui-space_bottom-3"
      >
        Submit
      </button>
    </form>

    <a tuiLink class="link" routerLink="registration"
      >Don't have an account? Sing up</a
    >
  </section>
</section>
